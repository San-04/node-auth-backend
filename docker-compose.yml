version: "3.8"

services:
  mysql_db:
    image: mysql:8.0.46
    restart: always
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_crud
    command: --authentication-policy=mysql_native_password,, --host-cache-size=0 --sql-mode=""
    volumes:
      - db_data:/var/lib/mysql

  api:
    build: .
    container_name: express_api
    restart: always
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - mysql_db

volumes:
  db_data:
